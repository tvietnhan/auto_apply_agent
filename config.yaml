name: "AutoApplyPipeline"
version: "2.0"
model: "gemini-2.5-flash" # Switch to 2.5-flash

pipeline:
  topology: "sequential" # Chạy tuần tự theo chuỗi
  agents:
    - name: "CV Tailor & Matcher Agent"
      source: "./agents/cv_tailor.md"
    - name: "Cover Letter & Email Content Writer"
      source: "./agents/mail_writer.md"
    - name: "Executor & Gatekeeper Agent"
      source: "./agents/gatekeeper.md"

tools:
  - path: "./tools/email_tool.py"
    functions:
      - "send_application_email"